model_name: dgf_dropout
modalities:
  text: true
  audio: true
  visual: true

output_dim_text: 768
output_dim_audio: 768
output_dim_visual: 512
batch_size_utterance: 64

d_model: 512
projection_activation: relu
projection_dropout: 0.3
use_layernorm: true

gate_hidden_dim: 128
gate_dropout: 0.2
num_classes: 7

use_modality_dropout: true
modality_dropout_p: 0.3
drop_text_p: 0.1
drop_audio_p: 0.2
drop_visual_p: 0.2
use_context: false

optimizer: adamw
learning_rate: 0.0001
weight_decay: 0.0001
batch_size_dialogue: 8
max_epochs: 50
early_stopping_patience: 5
loss: weighted_cross_entropy
seed: 114514
