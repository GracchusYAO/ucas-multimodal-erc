model_name: visual_face_only

modalities:
  visual_face: true

visual_model: openai/clip-vit-base-patch32
num_frames: 8
batch_size_visual: 32
face_margin: 0.35
output_dim_visual_face: 512
projection_dim: 256
dropout: 0.3
num_classes: 7

optimizer: adamw
learning_rate: 0.0001
weight_decay: 0.0001
batch_size_utterance: 64
max_epochs: 50
early_stopping_patience: 5
seed: 114514
