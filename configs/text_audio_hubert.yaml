model_name: text_audio_hubert
modalities:
  text: true
  audio: false
  audio_hubert: true
  visual: false

sample_rate: 16000
batch_size_audio_hubert: 8
max_audio_seconds: 12
output_dim_text: 768
output_dim_audio_hubert: 768
batch_size_utterance: 64

projection_dim: 256
dropout: 0.3
num_classes: 7

optimizer: adamw
learning_rate: 0.0001
weight_decay: 0.0001
max_epochs: 50
early_stopping_patience: 5
loss: weighted_cross_entropy
seed: 114514
