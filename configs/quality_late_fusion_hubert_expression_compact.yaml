model_name: quality_late_fusion_hubert

modalities:
  text: true
  audio: false
  audio_hubert: true
  audio_hubert_stats: false
  audio_prosody: false
  audio_hubert_prosody: false
  visual: false
  visual_face: false
  visual_expression: false
  visual_expression_compact: true

output_dim_text: 768
output_dim_audio_hubert: 768
output_dim_visual: 14
d_model: 512
projection_dropout: 0.35
use_layernorm: true
gate_hidden_dim: 128
gate_dropout: 0.2
text_gate_bias: 1.2
use_quality_dropout: true
drop_text_p: 0.05
drop_audio_p: 0.25
drop_visual_p: 0.25
num_classes: 7

optimizer: adamw
learning_rate: 0.0001
weight_decay: 0.0001
batch_size_utterance: 64
max_epochs: 50
early_stopping_patience: 5
seed: 114514
