model_name: context_lstm_residual_gated_fusion

modalities:
  text: true
  audio: false
  audio_hubert: true
  audio_hubert_stats: false
  audio_prosody: false
  audio_hubert_prosody: false
  visual: false
  visual_face: false
  visual_expression: true
  visual_expression_compact: false
  visual_clip_expression: false

output_dim_text: 768
output_dim_audio_hubert: 768
output_dim_visual: 782

d_model: 256
projection_dropout: 0.3
use_layernorm: true

use_context: true
context_encoder: bilstm
context_hidden_dim: 256
context_num_layers: 1
bidirectional: true
context_dropout: 0.3

gate_hidden_dim: 128
gate_dropout: 0.2
audio_gate_bias: -1.0
visual_gate_bias: -2.0
audio_residual_scale: 1.0
visual_residual_scale: 0.4
branch_dropout: 0.3
num_classes: 7

optimizer: adamw
learning_rate: 0.0001
weight_decay: 0.0001
batch_size_dialogue: 8
max_epochs: 50
early_stopping_patience: 5
loss: weighted_cross_entropy
seed: 114514
