model_name: visual_expression_only
modalities:
  text: false
  audio: false
  audio_hubert: false
  audio_hubert_stats: false
  audio_prosody: false
  audio_hubert_prosody: false
  visual: false
  visual_face: false
  visual_expression: true

visual_expression_model: trpakov/vit-face-expression
num_frames: 8
batch_size_visual: 32
face_margin: 0.35
face_only: false
output_dim_visual_expression: 782
batch_size_utterance: 64

projection_dim: 256
dropout: 0.3
num_classes: 7

optimizer: adamw
learning_rate: 0.0001
weight_decay: 0.0001
max_epochs: 50
early_stopping_patience: 5
loss: weighted_cross_entropy
seed: 114514
