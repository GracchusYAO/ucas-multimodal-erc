model_name: late_fusion_hubert_face

modalities:
  text: true
  audio_hubert: true
  visual_face: true

output_dim_text: 768
output_dim_audio_hubert: 768
output_dim_visual: 512
d_model: 256
projection_dropout: 0.35
use_layernorm: true
gate_hidden_dim: 128
gate_dropout: 0.2
num_classes: 7

optimizer: adamw
learning_rate: 0.0001
weight_decay: 0.0001
batch_size_utterance: 64
max_epochs: 50
early_stopping_patience: 5
seed: 114514
