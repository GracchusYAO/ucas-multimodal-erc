model_name: text_finetune

text_model: FacebookAI/roberta-base
local_files_only: true
pooling: cls
max_length: 128
num_classes: 7

dropout: 0.2
batch_size: 16
max_epochs: 8
early_stopping_patience: 3

optimizer: adamw
encoder_lr: 0.00002
classifier_lr: 0.0001
weight_decay: 0.01
warmup_ratio: 0.1
gradient_accumulation_steps: 1
max_grad_norm: 1.0
mixed_precision: true
loss: weighted_cross_entropy
seed: 114514
eval_test: true
